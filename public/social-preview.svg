<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">type shi message traffic dashboard preview</title>
  <desc id="desc">A graphic preview of a message analytics dashboard with summary metrics and chart shapes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbec"/>
      <stop offset="0.56" stop-color="#eaf6de"/>
      <stop offset="1" stop-color="#d8efe9"/>
    </linearGradient>
    <linearGradient id="cyanAcid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#14bdc8"/>
      <stop offset="1" stop-color="#d8ff37"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#15200f" flood-opacity="0.16"/>
    </filter>
    <pattern id="ticks" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#11150f" stroke-opacity="0.045" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="155" cy="90" r="220" fill="#d8ff37" opacity="0.36"/>
  <circle cx="1035" cy="82" r="210" fill="#19c7d4" opacity="0.22"/>
  <rect width="1200" height="630" fill="url(#ticks)"/>

  <g transform="translate(56 48)">
    <path d="M0 114H1088" stroke="#11150f" stroke-width="3"/>
    <text x="0" y="26" fill="#5f695a" font-family="Menlo, Consolas, monospace" font-size="18" font-weight="800" letter-spacing="2.5">MESSAGES DB / LOCAL AGGREGATE</text>
    <text x="0" y="104" fill="#11150f" font-family="Georgia, 'Iowan Old Style', serif" font-size="88" font-weight="900">type shi traffic</text>

    <g transform="translate(838 10) rotate(1.5)">
      <rect x="0" y="0" width="238" height="86" fill="#d8ff37" stroke="#11150f" stroke-width="3"/>
      <path d="M12 97H250V11" fill="none" stroke="#11150f" stroke-width="7"/>
      <text x="18" y="30" fill="#5f695a" font-family="Menlo, Consolas, monospace" font-size="15" font-weight="900">WINDOW</text>
      <text x="18" y="61" fill="#11150f" font-family="Avenir Next, Helvetica, sans-serif" font-size="24" font-weight="900">May 31 - Jun 13</text>
    </g>
  </g>

  <g transform="translate(56 190)" filter="url(#softShadow)">
    <g>
      <rect width="356" height="142" rx="10" fill="#11150f"/>
      <text x="24" y="38" fill="#aeb8a8" font-family="Menlo, Consolas, monospace" font-size="17" font-weight="900">TOTAL MESSAGES</text>
      <text x="24" y="112" fill="#ffffff" font-family="'Avenir Next Condensed', 'DIN Condensed', Helvetica, sans-serif" font-size="76" font-weight="900">33,699</text>
    </g>
    <g transform="translate(374 0)">
      <rect width="222" height="142" rx="10" fill="#ffffff" opacity="0.84" stroke="#c5d3ba"/>
      <text x="20" y="38" fill="#5f695a" font-family="Menlo, Consolas, monospace" font-size="15" font-weight="900">PEOPLE ACTIVE</text>
      <text x="20" y="111" fill="#11150f" font-family="'Avenir Next Condensed', 'DIN Condensed', Helvetica, sans-serif" font-size="72" font-weight="900">29</text>
    </g>
    <g transform="translate(612 0)">
      <rect width="222" height="142" rx="10" fill="#ffffff" opacity="0.84" stroke="#c5d3ba"/>
      <text x="20" y="38" fill="#5f695a" font-family="Menlo, Consolas, monospace" font-size="15" font-weight="900">MESSAGES / DAY</text>
      <text x="20" y="111" fill="#11150f" font-family="'Avenir Next Condensed', 'DIN Condensed', Helvetica, sans-serif" font-size="72" font-weight="900">92.3</text>
    </g>
    <g transform="translate(850 0)">
      <rect width="238" height="142" rx="10" fill="#ffffff" opacity="0.84" stroke="#c5d3ba"/>
      <text x="20" y="38" fill="#5f695a" font-family="Menlo, Consolas, monospace" font-size="15" font-weight="900">TOP SENDER</text>
      <text x="20" y="108" fill="#11150f" font-family="Georgia, 'Iowan Old Style', serif" font-size="48" font-weight="900">luke</text>
    </g>
  </g>

  <g transform="translate(56 354)">
    <rect width="692" height="216" rx="10" fill="#ffffff" opacity="0.84" stroke="#c5d3ba" filter="url(#softShadow)"/>
    <text x="24" y="38" fill="#5f695a" font-family="Menlo, Consolas, monospace" font-size="16" font-weight="900">LEADERBOARD</text>
    <text x="24" y="72" fill="#11150f" font-family="Georgia, 'Iowan Old Style', serif" font-size="34" font-weight="900">messages by person</text>
    <g transform="translate(24 100)">
      <g>
        <circle cx="18" cy="20" r="18" fill="#d8ff37" stroke="#11150f" stroke-width="2"/>
        <text x="14" y="27" fill="#11150f" font-family="Menlo, Consolas, monospace" font-size="18" font-weight="900">1</text>
        <text x="54" y="17" fill="#11150f" font-family="Avenir Next, Helvetica, sans-serif" font-size="22" font-weight="900">luke</text>
        <text x="54" y="39" fill="#5f695a" font-family="Menlo, Consolas, monospace" font-size="14" font-weight="700">participant / 11.3%</text>
        <rect x="238" y="4" width="356" height="32" rx="5" fill="#eef4e8" stroke="#d8dfd2"/>
        <rect x="238" y="4" width="356" height="32" rx="5" fill="url(#cyanAcid)"/>
        <text x="616" y="30" fill="#11150f" font-family="'Avenir Next Condensed', Helvetica, sans-serif" font-size="34" font-weight="900" text-anchor="end">3,807</text>
      </g>
      <g transform="translate(0 58)">
        <circle cx="18" cy="20" r="18" fill="#d8ff37" stroke="#11150f" stroke-width="2"/>
        <text x="14" y="27" fill="#11150f" font-family="Menlo, Consolas, monospace" font-size="18" font-weight="900">2</text>
        <text x="54" y="17" fill="#11150f" font-family="Avenir Next, Helvetica, sans-serif" font-size="22" font-weight="900">anish</text>
        <text x="54" y="39" fill="#5f695a" font-family="Menlo, Consolas, monospace" font-size="14" font-weight="700">participant / 8.3%</text>
        <rect x="238" y="4" width="356" height="32" rx="5" fill="#eef4e8" stroke="#d8dfd2"/>
        <rect x="238" y="4" width="262" height="32" rx="5" fill="url(#cyanAcid)"/>
        <text x="616" y="30" fill="#11150f" font-family="'Avenir Next Condensed', Helvetica, sans-serif" font-size="34" font-weight="900" text-anchor="end">2,806</text>
      </g>
    </g>
  </g>

  <g transform="translate(770 354)">
    <rect width="374" height="216" rx="10" fill="#ffffff" opacity="0.84" stroke="#c5d3ba" filter="url(#softShadow)"/>
    <text x="22" y="38" fill="#5f695a" font-family="Menlo, Consolas, monospace" font-size="16" font-weight="900">DAILY PULSE</text>
    <text x="22" y="72" fill="#11150f" font-family="Georgia, 'Iowan Old Style', serif" font-size="34" font-weight="900">last 14 days</text>
    <g transform="translate(22 100)">
      <rect x="0" y="0" width="40" height="74" rx="6" fill="#69dbe1"/>
      <rect x="48" y="0" width="40" height="74" rx="6" fill="#9eeed7"/>
      <rect x="96" y="0" width="40" height="74" rx="6" fill="#54d2dd"/>
      <rect x="144" y="0" width="40" height="74" rx="6" fill="#c2fa91"/>
      <rect x="192" y="0" width="40" height="74" rx="6" fill="#38c9d6"/>
      <rect x="240" y="0" width="40" height="74" rx="6" fill="#b8f76f"/>
      <rect x="288" y="0" width="40" height="74" rx="6" fill="#19c7d4"/>
    </g>
    <text x="22" y="198" fill="#5f695a" font-family="Menlo, Consolas, monospace" font-size="15" font-weight="900">hourly traffic is moving</text>
  </g>
</svg>
